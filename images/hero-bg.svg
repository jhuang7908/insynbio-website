<svg width="1440" height="600" viewBox="0 0 1440 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9fff7" />
      <stop offset="55%" stop-color="#eefefb" />
      <stop offset="100%" stop-color="#b8fff0" />
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1440" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="node-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <radialGradient id="glow-1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <pattern id="hex-grid" x="0" y="0" width="80" height="139" patternUnits="userSpaceOnUse">
      <path d="M40 0 L80 23.1 L80 69.3 L40 92.4 L0 69.3 L0 23.1 Z" fill="none" stroke="#0d9488" stroke-width="0.8" opacity="0.12"/>
      <path d="M40 46.2 L80 69.3 L80 115.5 L40 138.6 L0 115.5 L0 69.3 Z" fill="none" stroke="#0d9488" stroke-width="0.8" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Base gradient -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Hex grid (very subtle) -->
  <rect width="100%" height="100%" fill="url(#hex-grid)" opacity="0.55" />

  <!-- Ambient glows -->
  <ellipse cx="300" cy="200" rx="250" ry="200" fill="url(#glow-1)" />
  <ellipse cx="1100" cy="400" rx="300" ry="220" fill="url(#glow-2)" />
  <ellipse cx="720" cy="100" rx="200" ry="150" fill="url(#glow-1)" />

  <!-- Removed: antibody/humanization process visuals (keep background minimal) -->

  <!-- Minimal corner ornaments (keep content area clean) -->
  <g fill="#0d9488" opacity="0.24">
    <circle cx="120" cy="110" r="2.2" />
    <circle cx="170" cy="150" r="1.8" />
    <circle cx="210" cy="95" r="1.4" />
    <circle cx="1285" cy="465" r="2.2" />
    <circle cx="1335" cy="510" r="1.7" />
    <circle cx="1260" cy="535" r="1.3" />
  </g>
  <g stroke="#0d9488" stroke-width="1" opacity="0.14">
    <line x1="120" y1="110" x2="170" y2="150" />
    <line x1="170" y1="150" x2="210" y2="95" />
    <line x1="1285" y1="465" x2="1335" y2="510" />
    <line x1="1335" y1="510" x2="1260" y2="535" />
  </g>

  <!-- Biopharma + AI motifs (edge-only, low contrast) -->
  <!-- Bio: mini-helix in the upper-right corner -->
  <g fill="none" stroke="#0d9488" stroke-width="1.6" opacity="0.18">
    <path d="M1120 92 C1160 60 1200 60 1240 92 C1280 124 1320 124 1360 92" />
    <path d="M1120 124 C1160 156 1200 156 1240 124 C1280 92 1320 92 1360 124" />
    <path d="M1160 108 L1200 108" />
    <path d="M1240 108 L1280 108" />
    <path d="M1320 108 L1360 108" />
  </g>

  <!-- AI: subtle circuit traces in the lower-left corner -->
  <g fill="none" stroke="#0d9488" stroke-width="1.35" opacity="0.18" stroke-linecap="round" stroke-linejoin="round">
    <path d="M120 470 H210 V520 H280" />
    <path d="M150 500 H230" />
    <path d="M230 500 V455 H310" />
    <path d="M190 535 H255 V565" />
  </g>
  <g fill="#0d9488" opacity="0.22">
    <circle cx="120" cy="470" r="2.3" />
    <circle cx="210" cy="470" r="2.0" />
    <circle cx="210" cy="520" r="2.0" />
    <circle cx="280" cy="520" r="2.1" />
    <circle cx="150" cy="500" r="1.8" />
    <circle cx="230" cy="500" r="1.9" />
    <circle cx="230" cy="455" r="1.8" />
    <circle cx="310" cy="455" r="2.0" />
    <circle cx="190" cy="535" r="1.7" />
    <circle cx="255" cy="535" r="1.7" />
    <circle cx="255" cy="565" r="1.7" />
  </g>
</svg>
